name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    env:
      # contributor-assistant/github-action still ships a Node 20 runtime; no
      # newer release exists (v2.6.1 and the action's main both declare node20).
      # Opt into Node 24 ahead of GitHub's 2026-06-16 forced switch and
      # 2026-09-16 Node 20 removal. Drop this once the action ships a native
      # Node 24 build.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: CLA Assistant
        if: github.event_name == 'pull_request_target' || github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with Contents: read & write on promise-language/cla-signatures
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-document: 'https://promise-lang.org/cla/individual'
          # Stored in the PRIVATE promise-language/cla-signatures repo (PII).
          path-to-signatures: 'signatures/v1/cla.json'
          branch: 'main'
          allowlist: djabi,*[bot]
          remote-organization-name: promise-language
          remote-repository-name: cla-signatures
